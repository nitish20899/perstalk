name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --upgrade ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: unit tests
        run: python -m unittest discover -s tests

  shell:
    name: Shell script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n start.sh
        run: bash -n start.sh

      - name: shellcheck (best-effort, advisory)
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y shellcheck
          shellcheck start.sh

  macos:
    name: Native macOS smoke test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and verify app bundle
        run: ./macos/smoke-test.sh

      - name: Package app archive
        run: ./macos/package-app.sh

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: perstalk-flow-macos
          path: |
            macos/dist/*.zip
            macos/dist/*.sha256
