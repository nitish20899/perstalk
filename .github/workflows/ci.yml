name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --upgrade ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  shell:
    name: Shell script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n start.sh
        run: bash -n start.sh

      - name: shellcheck (best-effort, advisory)
        continue-on-error: true
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y shellcheck
          shellcheck start.sh
